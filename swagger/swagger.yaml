openapi: 3.0.0
info:
  title: Stareast Commerce API
  version: 1.0.0
  description: Simple in-memory e-commerce API
servers:
  - url: http://localhost:3000
paths:
  /register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        "201":
          description: User registered
  /login:
    post:
      summary: Login and get JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: JWT returned
  /checkout:
    post:
      summary: Checkout order (authenticated)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId, quantity, paymentMethod]
              properties:
                productId:
                  type: integer
                quantity:
                  type: integer
                paymentMethod:
                  type: string
                  enum: [cash, credit_card]
      responses:
        "200":
          description: Checkout completed
        "401":
          description: Unauthorized
  /healthcheck:
    get:
      summary: Health check
      responses:
        "200":
          description: API healthy
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
